aid: mosaic-app
name: Mosaic
description: >-
  Mosaic is a resource management, workforce planning, and AI-assisted
  project management platform built for architecture, engineering, and
  professional services firms. It plugs into the ERPs those firms already
  run — Deltek (Ajera, Vantagepoint, Vision, Costpoint), Unanet, BST10,
  BQE Core, QuickBooks, Salesforce, and Microsoft Dynamics 365 — plus
  project management systems (Asana, Jira, GitHub, Karbon) and HRIS
  (BambooHR), then unifies the data into a single forecasting, time-entry,
  and capacity-planning surface. Mosaic exposes an Open API for custom
  integrations alongside its packaged connectors.
type: Index
position: Provider
access: 3rd-Party
